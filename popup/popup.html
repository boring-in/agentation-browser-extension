<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="section">
      <div class="section-header">
        <h2>Agentation <span class="version-update" id="versionUpdate" style="display:none;" title="New agentation version available"></span></h2>
        <label class="header-toggle">
          <input type="checkbox" id="enabled">
        </label>
      </div>
      <div class="status-row">
        <span class="dot dot--off" id="pageDot"></span>
        <span id="statusText">Not injected</span>
      </div>
    </div>

    <div class="field" id="sessionField" style="display:none;">
      <label>Session ID</label>
      <div class="copyable">
        <code id="sessionId"></code>
        <button id="copySession" title="Copy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-header">
        <h2>MCP Sync</h2>
        <label class="header-toggle">
          <input type="checkbox" id="mcpSync">
        </label>
      </div>
      <div class="status-row">
        <span class="dot dot--off" id="mcpDot"></span>
        <span id="mcpStatusText">Disabled</span>
        <button class="btn-copy-cmd" id="copyCmd" style="display:none;" title="Copy start command">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          <span>npx agentation-mcp</span>
        </button>
      </div>
      <div class="mcp-detail" id="mcpDetail">
        <div class="field-inline">
          <label for="mcpUrl">Server</label>
          <input type="url" id="mcpUrl" placeholder="http://localhost:4747">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <h2>Disabled Sites</h2>
      <button class="btn-block-site" id="blockSite" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>Block <strong id="currentHostname"></strong></span>
      </button>
      <div class="blocked-list" id="blockedList"></div>
    </div>

  </div>

  <script src="../dist/popup.js"></script>
</body>
</html>
